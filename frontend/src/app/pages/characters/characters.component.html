<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-info mb-0">👤 Personajes</h2>
    <app-export-buttons-simple 
      [data]="characters()" 
      filename="personajes"
      title="Listado de Personajes"
      [columns]="exportColumns">
    </app-export-buttons-simple>
  </div>

  <!-- Filtros -->
  <div class="filter-bar mb-4">
    <input class="form-control" placeholder="Buscar por nombre..."
      [(ngModel)]="filters.name" (keyup.enter)="applyFilters()">
    <select class="form-select" [(ngModel)]="filters.status" (change)="applyFilters()">
      <option value="">Todos los estados</option>
      <option value="Alive">Vivo</option>
      <option value="Dead">Muerto</option>
      <option value="unknown">Desconocido</option>
    </select>
    <input class="form-control" placeholder="Especie..."
      [(ngModel)]="filters.species" (keyup.enter)="applyFilters()">
    <button class="btn btn-info" (click)="applyFilters()">🔍 Buscar</button>
  </div>

  <!-- Ordenamiento -->
  <app-sort-dropdown
    [sortOptions]="sortOptions"
    (sortChange)="onSortChange($event)">
  </app-sort-dropdown>

  <app-spinner *ngIf="loading()"></app-spinner>

  <div class="row g-3" *ngIf="!loading()">
    <div class="col-md-3 col-sm-6" *ngFor="let character of characters()">
      <app-card
        [id]="character.id"
        [name]="character.name"
        [image]="character.image"
        [subtitle]="character.species"
        [badge]="character.status"
        [badgeColor]="getStatusBadge(character.status)"
        [type]="'CHARACTER'"
        [isFavorite]="isFavorite(character.id)"
        (cardClick)="goToDetail(character.id)"
        (favoriteToggle)="toggleFavorite(character)">
      </app-card>
    </div>
  </div>

  <div class="mt-4">
    <app-pagination [currentPage]="currentPage" [totalPages]="totalPages"
      (pageChange)="onPageChange($event)">
    </app-pagination>
  </div>
</div>
