<div class="container-fluid p-4">
  <h2 class="text-info mb-4">🌍 Locaciones</h2>

  <!-- Filtros -->
  <div class="filter-bar mb-4">
    <input class="form-control" placeholder="Buscar por nombre..."
      [(ngModel)]="filters.name" (keyup.enter)="applyFilters()">
    <input class="form-control" placeholder="Tipo (Planet, Space station...)"
      [(ngModel)]="filters.type" (keyup.enter)="applyFilters()">
    <input class="form-control" placeholder="Dimensión..."
      [(ngModel)]="filters.dimension" (keyup.enter)="applyFilters()">
    <button class="btn btn-info" (click)="applyFilters()">🔍 Buscar</button>
  </div>

  <app-spinner *ngIf="loading()"></app-spinner>

  <div class="row g-3" *ngIf="!loading()">
    <div class="col-md-3 col-sm-6" *ngFor="let location of locations()">
      <app-card
        [id]="location.id"
        [name]="location.name"
        [subtitle]="location.dimension"
        [badge]="location.type"
        [type]="'LOCATION'"
        [isFavorite]="isFavorite(location.id)"
        (cardClick)="goToDetail(location.id)"
        (favoriteToggle)="toggleFavorite(location)">
      </app-card>
    </div>

    <div class="col-12 text-center text-muted py-5" *ngIf="locations().length === 0">
      No se encontraron locaciones con esos filtros.
    </div>
  </div>

  <div class="mt-4">
    <app-pagination [currentPage]="currentPage" [totalPages]="totalPages"
      (pageChange)="onPageChange($event)">
    </app-pagination>
  </div>
</div>
